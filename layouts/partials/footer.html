<footer class="site-footer">
  {{ with .Site.Params.social }}
  <nav class="footer-social" aria-label="Social links">
    {{ range . }}<a href="{{ .url }}" target="_blank" rel="noopener">{{ .name }}</a>{{ end }}
  </nav>
  {{ end }}
  <p>&copy; {{ now.Year }} {{ .Site.Title }}</p>
</footer>
<dialog class="lightbox" id="lightbox"><img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBTAA7" alt=""></dialog>
<script>
(function () {
  var toggle = document.getElementById('lang-toggle');
  if (toggle) {
    toggle.addEventListener('click', function () {
      localStorage.setItem('lang-pref', toggle.dataset.lang);
    });
  }
})();
(function () {
  var box = document.getElementById('lightbox');
  if (!box || !box.showModal) return;
  var pic = box.firstElementChild;
  document.addEventListener('click', function (e) {
    var img = e.target.closest('.content img');
    if (!img || img.closest('a')) return;
    pic.src = img.dataset.zoom || img.src;
    pic.alt = img.alt;
    box.showModal();
  });
  box.addEventListener('click', function () { box.close(); });
})();
</script>

{{ define "main" }}
<article class="page page-list page-archive">
  <h1>{{ .Title }}</h1>
  <div class="content">{{ partial "content.html" . }}</div>
  <ul class="post-list">
    {{ range .Pages.ByDate.Reverse }}
    {{ partial "post-li.html" (dict "page" . "dateFormat" "2 January 2006") }}
    {{ end }}
  </ul>
</article>
{{ end }}

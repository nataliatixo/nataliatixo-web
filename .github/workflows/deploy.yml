name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.164.0"
          extended: true
      # Processed-image cache (resources/_gen is gitignored); without it every
      # deploy re-encodes all WebP/thumbnail derivatives from scratch.
      - uses: actions/cache@v6
        with:
          path: resources
          key: hugo-resources-${{ hashFiles('content/**') }}
          restore-keys: hugo-resources-
      - name: Build
        run: hugo --minify
      # Internal-link check (.htmltest.yml). public/ is hardlinked under
      # linkcheck/<baseURL subpath>/ so root-relative hrefs resolve exactly as
      # they will on Pages — links missing the subpath prefix fail the build.
      # The subpath is derived from baseURL, so the custom-domain switch
      # (no subpath) needs no edit here.
      - name: Check internal links
        run: |
          subpath=$(hugo config --format json | jq -r '.baseurl' | sed -E 's|^https?://[^/]+||; s|/+$||')
          mkdir -p "$(dirname "linkcheck$subpath")" && cp -al public "linkcheck$subpath"
          curl -sSL https://github.com/wjdp/htmltest/releases/download/v0.17.0/htmltest_0.17.0_linux_amd64.tar.gz | tar xz htmltest
          ./htmltest
      # v4+ excludes dotfiles from the artifact — fine here, the built site
      # has none (verified); revisit if a dotfile ever needs publishing.
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

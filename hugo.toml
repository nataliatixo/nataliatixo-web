baseURL = 'https://nataliatixo.com/'
title = 'Natalia Tikhonova'

defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false

[taxonomies]
category = 'categories'
tag = 'tags'

[markup.goldmark.renderer]
  unsafe = true

[languages]
  [languages.en]
    label = 'English'
    locale = 'en-us'
    weight = 1
    contentDir = 'content'

  [languages.ru]
    label = 'Русский'
    locale = 'ru-ru'
    weight = 2
    contentDir = 'content'

[languages.en.menus]
  [[languages.en.menus.main]]
    name = 'About'
    pageRef = '/'
    weight = 1
  [[languages.en.menus.main]]
    name = 'Projects'
    pageRef = '/projects'
    weight = 2
  [[languages.en.menus.main]]
    name = 'Texts'
    pageRef = '/texts'
    weight = 3
  [[languages.en.menus.main]]
    name = 'Archive'
    pageRef = '/archive'
    weight = 4

[languages.ru.menus]
  [[languages.ru.menus.main]]
    name = 'О себе'
    pageRef = '/'
    weight = 1
  [[languages.ru.menus.main]]
    name = 'Проекты'
    pageRef = '/projects'
    weight = 2
  [[languages.ru.menus.main]]
    name = 'Тексты'
    pageRef = '/texts'
    weight = 3
  [[languages.ru.menus.main]]
    name = 'Архив'
    pageRef = '/archive'
    weight = 4

[params]
  description = 'Natalia Tikhonova — artist portfolio, curatorial projects, and writing.'

baseURL = 'https://nataliatixo.com/'
title = 'Natalia Tikhonova'

defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false

[taxonomies]
category = 'categories'
tag = 'tags'

[markup.goldmark.renderer]
  unsafe = true

[languages]
  [languages.en]
    label = 'English'
    locale = 'en-us'
    weight = 1
    contentDir = 'content'

  [languages.ru]
    label = 'Русский'
    locale = 'ru-ru'
    weight = 2
    contentDir = 'content'

[menus]
  [[menus.main]]
    name = 'About'
    pageRef = '/'
    weight = 1
  [[menus.main]]
    name = 'Artistic Objects'
    pageRef = '/artistic-objects'
    weight = 2
  [[menus.main]]
    name = 'Curatorial Projects'
    pageRef = '/curatorial'
    weight = 3
  [[menus.main]]
    name = 'Blog'
    pageRef = '/posts'
    weight = 4
  [[menus.main]]
    name = 'Texts'
    pageRef = '/poetical'
    weight = 5

[params]
  description = 'Natalia Tikhonova — artist portfolio, curatorial projects, and writing.'
